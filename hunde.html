<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Git-Workshop Hunde 🐕</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f0ece0;
      font-family: Arial, sans-serif;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      padding: 18px 18px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .scene {
      position: relative;
      width: 300px;
      height: 220px;
    }
    /* Sprechblase */
    .bubble {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 10px 14px;
      background: white;
      border: 2.5px solid #333;
      border-radius: 16px;
      min-width: 160px;
      max-width: 220px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      word-break: break-word;
    }
    .bubble::after {
      content: "";
      position: absolute;
      right: 28px;
      bottom: -15px;
      width: 16px;
      height: 16px;
      background: white;
      border-right: 2.5px solid #333;
      border-bottom: 2.5px solid #333;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }
    .bubble::before {
      content: "";
      position: absolute;
      right: 15px;
      bottom: -25px;
      width: 10px;
      height: 10px;
      background: white;
      border-right: 2.5px solid #333;
      border-bottom: 2.5px solid #333;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }
    .dog-wrap {
      position: absolute;
      right: 18px;
      bottom: 30px;
      animation: hop 1.1s infinite ease-in-out;
      transform-origin: center bottom;
    }
    @keyframes hop {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%       { transform: translateY(-9px) rotate(-4deg); }
      50%       { transform: translateY(0) rotate(4deg); }
      75%       { transform: translateY(-4px) rotate(-2deg); }
    }
  </style>
</head>

      fellfarbe:   "grau",

      // Accessoire – Auswahl: "hut", "sonnenbrille", "halstuch", "keins", "krone", "krawatte", "fliege", "halsband", "brille", "schleife", "muetze", "kappe", "kopfhoerer", "blume"

    // ── Farbpaletten ──────────────────────────────────────────────
    const fellpaletten = {
      braun:   { body: "#8B5E3C", bauch: "#C4956A", nase: "#3a1a08", ohr: "#6B4423" },
      schwarz: { body: "#222222", bauch: "#555555", nase: "#000000", ohr: "#111111" },
      golden:  { body: "#D4A017", bauch: "#F0C85A", nase: "#5a3200", ohr: "#B8860B" },
      weiss:   { body: "#EEEEEE", bauch: "#FFFFFF", nase: "#888888", ohr: "#CCCCCC" },
      grau:    { body: "#888888", bauch: "#BBBBBB", nase: "#333333", ohr: "#666666" }
    };

    // ── Hintergründe (SVG-Rechteck + Deko) ───────────────────────
    function hintergrundSVG(typ, w, h) {
      switch (typ) {
        case "wiese":
          return `
            <rect width="${w}" height="${h}" fill="#87CEEB"/>
            <rect y="${h*0.65}" width="${w}" height="${h*0.35}" fill="#5aac44"/>
            <ellipse cx="40" cy="${h*0.62}" rx="28" ry="16" fill="#4a9e33" opacity="0.7"/>
            <ellipse cx="240" cy="${h*0.60}" rx="22" ry="13" fill="#4a9e33" opacity="0.6"/>
            <circle cx="220" cy="30" r="18" fill="#FFE066"/>
          `;
        case "schnee":
          return `
            <rect width="${w}" height="${h}" fill="#cce8f7"/>
            <rect y="${h*0.65}" width="${w}" height="${h*0.35}" fill="#e8f4fb"/>
            <circle cx="50" cy="40" r="10" fill="white" opacity="0.9"/>
            <circle cx="65" cy="32" r="14" fill="white" opacity="0.9"/>
            <circle cx="80" cy="40" r="10" fill="white" opacity="0.9"/>
            <circle cx="210" cy="35" r="8" fill="white" opacity="0.8"/>
            <circle cx="222" cy="28" r="11" fill="white" opacity="0.8"/>
            <circle cx="235" cy="35" r="8" fill="white" opacity="0.8"/>
            <!-- Schneeflocken -->
            <text x="160" y="55" font-size="16" fill="white" opacity="0.7">❄</text>
            <text x="20"  y="70" font-size="12" fill="white" opacity="0.6">❄</text>
          `;
        case "strand":
          return `
            <rect width="${w}" height="${h}" fill="#87CEEB"/>
            <rect y="${h*0.55}" width="${w}" height="${h*0.12}" fill="#4a8fd4" opacity="0.8"/>
            <rect y="${h*0.65}" width="${w}" height="${h*0.35}" fill="#f5d88a"/>
            <circle cx="220" cy="32" r="20" fill="#FFE066"/>
            <ellipse cx="60" cy="${h*0.58}" rx="18" ry="6" fill="#6ab4e8" opacity="0.5"/>
          `;
        case "stadt":
          return `
            <rect width="${w}" height="${h}" fill="#8899bb"/>
            <rect y="${h*0.65}" width="${w}" height="${h*0.35}" fill="#777"/>
            <!-- Gebäude links -->
            <rect x="8"  y="${h*0.30}" width="36" height="${h*0.38}" fill="#556"/>
            <rect x="50" y="${h*0.20}" width="28" height="${h*0.48}" fill="#445"/>
            <!-- Fenster -->
            <rect x="14" y="${h*0.34}" width="8" height="8" fill="#FFE066" opacity="0.9"/>
            <rect x="28" y="${h*0.34}" width="8" height="8" fill="#FFE066" opacity="0.9"/>
            <rect x="14" y="${h*0.47}" width="8" height="8" fill="#aac" opacity="0.6"/>
            <rect x="55" y="${h*0.25}" width="7" height="7" fill="#FFE066" opacity="0.9"/>
            <rect x="65" y="${h*0.25}" width="7" height="7" fill="#aac" opacity="0.6"/>
            <!-- Mond -->
            <circle cx="220" cy="30" r="14" fill="#ffe"/>
            <circle cx="228" cy="24" r="10" fill="#8899bb"/>
          `;
        case "wald":
          return `
            <rect width="${w}" height="${h}" fill="#b8d9a0"/>
            <rect y="${h*0.65}" width="${w}" height="${h*0.35}" fill="#5a7a3a"/>
            <!-- Bäume -->
            <polygon points="30,${h*0.65} 55,${h*0.20} 80,${h*0.65}" fill="#3a6e28"/>
            <rect x="50" y="${h*0.60}" width="10" height="${h*0.10}" fill="#7B4F28"/>
            <polygon points="200,${h*0.65} 225,${h*0.18} 250,${h*0.65}" fill="#3a6e28"/>
            <rect x="220" y="${h*0.60}" width="10" height="${h*0.10}" fill="#7B4F28"/>
            <circle cx="150" cy="22" r="10" fill="#FFE066"/>
          `;
        default:
          return `<rect width="${w}" height="${h}" fill="#e0e8f0"/>`;
      }
    }

    // ── Accessoire-SVG (relativ zum Hundekopf) ────────────────────
    // dogSize = Gesamthöhe des Hundes; Kopfmittelpunkt bei ca. (dogSize*0.37, dogSize*0.22) vom SVG-Ursprung
    function accessoireSVG(typ, s) {
      // s = groesse
      const headX = s * 0.37;
      const headY = s * 0.14;
      const headR = s * 0.19;
      switch (typ) {
        case "hut":
          return `
            <rect x="${headX - headR * 0.9}" y="${headY - headR * 1.1}" width="${headR * 1.8}" height="${headR * 0.55}" rx="3" fill="#222" stroke="#111" stroke-width="1.5"/>
            <rect x="${headX - headR * 0.6}" y="${headY - headR * 1.1 - headR * 0.65}" width="${headR * 1.2}" height="${headR * 0.7}" rx="4" fill="#222" stroke="#111" stroke-width="1.5"/>
          `;
        case "sonnenbrille":
          return `
            <rect x="${headX - headR * 0.72}" y="${headY - headR * 0.08}" width="${headR * 0.55}" height="${headR * 0.38}" rx="5" fill="#1a1a2e" opacity="0.9" stroke="#555" stroke-width="1"/>
            <rect x="${headX + headR * 0.17}" y="${headY - headR * 0.08}" width="${headR * 0.55}" height="${headR * 0.38}" rx="5" fill="#1a1a2e" opacity="0.9" stroke="#555" stroke-width="1"/>
            <line x1="${headX - headR * 0.17}" y1="${headY + headR * 0.10}" x2="${headX + headR * 0.17}" y2="${headY + headR * 0.10}" stroke="#888" stroke-width="1.5"/>
            <line x1="${headX - headR * 0.72 - headR * 0.30}" y1="${headY + headR * 0.10}" x2="${headX - headR * 0.72}" y2="${headY + headR * 0.10}" stroke="#888" stroke-width="1.5"/>
            <line x1="${headX + headR * 0.72}" y1="${headY + headR * 0.10}" x2="${headX + headR * 0.72 + headR * 0.25}" y2="${headY + headR * 0.10}" stroke="#888" stroke-width="1.5"/>
          `;
        case "halstuch":
          return `
            <path d="M${headX - headR * 0.65} ${s * 0.47} Q${headX} ${s * 0.54} ${headX + headR * 0.65} ${s * 0.47} L${headX + headR * 0.5} ${s * 0.52} Q${headX} ${s * 0.60} ${headX - headR * 0.5} ${s * 0.52} Z"
              fill="#e03030" stroke="#a00" stroke-width="1"/>
            <polygon points="${headX},${s*0.58} ${headX - headR*0.22},${s*0.68} ${headX + headR*0.22},${s*0.68}" fill="#c02020"/>
          `;
        default:
          return "";
      }
    }

    // ── SVG-Hund ──────────────────────────────────────────────────
    function hundSVG(config) {
      const s = config.groesse || 100;
      const p = fellpaletten[config.fellfarbe] || fellpaletten.braun;
      const acc = accessoireSVG(config.accessoire, s);

      // Proportionen relativ zu s
      const bx = s * 0.18, by = s * 0.45;   // Körper-Start
      const bw = s * 0.60, bh = s * 0.38;   // Körper-Breite/Höhe
      const hx = s * 0.26, hy = s * 0.05;   // Kopf-Mittelpunkt
      const hr = s * 0.22;                   // Kopf-Radius

      return `
      <svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">

        <!-- Schwanz -->
        <path d="M${bx + bw} ${by + bh * 0.3}
                 Q${s * 1.05} ${by - bh * 0.2}
                   ${s * 0.95} ${by - bh * 0.45}"
          stroke="${p.body}" stroke-width="${s*0.08}" fill="none" stroke-linecap="round"/>

        <!-- Körper -->
        <ellipse cx="${bx + bw*0.50}" cy="${by + bh*0.45}"
                 rx="${bw*0.52}" ry="${bh*0.46}" fill="${p.body}"/>
        <!-- Bauch -->
        <ellipse cx="${bx + bw*0.45}" cy="${by + bh*0.52}"
                 rx="${bw*0.28}" ry="${bh*0.30}" fill="${p.bauch}" opacity="0.7"/>

        <!-- Beine (4 Stück) -->
        <rect x="${bx + bw*0.08}" y="${by + bh*0.68}" width="${s*0.09}" height="${s*0.19}" rx="${s*0.04}" fill="${p.body}"/>
        <rect x="${bx + bw*0.25}" y="${by + bh*0.72}" width="${s*0.09}" height="${s*0.17}" rx="${s*0.04}" fill="${p.body}"/>
        <rect x="${bx + bw*0.55}" y="${by + bh*0.68}" width="${s*0.09}" height="${s*0.19}" rx="${s*0.04}" fill="${p.body}"/>
        <rect x="${bx + bw*0.72}" y="${by + bh*0.72}" width="${s*0.09}" height="${s*0.17}" rx="${s*0.04}" fill="${p.body}"/>

        <!-- Ohren -->
        <ellipse cx="${hx - hr*0.55}" cy="${hy + hr*0.10}" rx="${hr*0.30}" ry="${hr*0.55}"
                 fill="${p.ohr}" transform="rotate(-18, ${hx - hr*0.55}, ${hy + hr*0.10})"/>
        <ellipse cx="${hx + hr*0.55}" cy="${hy + hr*0.10}" rx="${hr*0.30}" ry="${hr*0.55}"
                 fill="${p.ohr}" transform="rotate(18, ${hx + hr*0.55}, ${hy + hr*0.10})"/>

        <!-- Kopf -->
        <circle cx="${hx}" cy="${hy + hr}" r="${hr}" fill="${p.body}"/>

        <!-- Schnauze -->
        <ellipse cx="${hx + hr*0.18}" cy="${hy + hr*1.42}" rx="${hr*0.52}" ry="${hr*0.35}" fill="${p.bauch}"/>
        <!-- Nase -->
        <ellipse cx="${hx + hr*0.18}" cy="${hy + hr*1.22}" rx="${hr*0.22}" ry="${hr*0.14}" fill="${p.nase}"/>
        <!-- Mund -->
        <path d="M${hx + hr*0.0} ${hy + hr*1.48} Q${hx + hr*0.18} ${hy + hr*1.62} ${hx + hr*0.36} ${hy + hr*1.48}"
          stroke="${p.nase}" stroke-width="${s*0.025}" fill="none" stroke-linecap="round"/>

        <!-- Augen -->
        <circle cx="${hx - hr*0.30}" cy="${hy + hr*0.80}" r="${hr*0.14}" fill="#222"/>
        <circle cx="${hx + hr*0.55}" cy="${hy + hr*0.80}" r="${hr*0.14}" fill="#222"/>
        <circle cx="${hx - hr*0.26}" cy="${hy + hr*0.75}" r="${hr*0.05}" fill="white"/>
        <circle cx="${hx + hr*0.59}" cy="${hy + hr*0.75}" r="${hr*0.05}" fill="white"/>

        <!-- Accessoire -->
        ${acc}
      </svg>`;
    }

    // ── Karte für einen Hund rendern ──────────────────────────────
    function renderHund(config, container) {
      const W = 300, H = 220;

      // Karte
      const card = document.createElement("div");
      card.className = "card";

      // Name
      const h2 = document.createElement("h2");
      h2.textContent = config.name;
      card.appendChild(h2);

      // Scene
      const scene = document.createElement("div");
      scene.className = "scene";
      scene.style.width  = W + "px";
      scene.style.height = H + "px";

      // Hintergrund-SVG
      const bgDiv = document.createElement("div");
      bgDiv.style.cssText = `position:absolute;top:0;left:0;width:${W}px;height:${H}px;border-radius:12px;overflow:hidden;`;
      bgDiv.innerHTML = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${hintergrundSVG(config.hintergrund, W, H)}</svg>`;
      scene.appendChild(bgDiv);

      // Sprechblase
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = config.texte[0] || "Wuff!";
      scene.appendChild(bubble);

      // Hund
      const dogWrap = document.createElement("div");
      dogWrap.className = "dog-wrap";
      dogWrap.innerHTML = hundSVG(config);
      scene.appendChild(dogWrap);

      card.appendChild(scene);
      container.appendChild(card);

      // Text-Rotation
      let idx = 0;
      setInterval(() => {
        idx = (idx + 1) % config.texte.length;
        bubble.textContent = config.texte[idx];
      }, 1000 + Math.random() * 500); // leicht versetzt, damit nicht alle gleichzeitig wechseln
    }

    // ── Alle Hunde rendern ────────────────────────────────────────
    const grid = document.getElementById("grid");
    alleHunde.forEach(cfg => renderHund(cfg, grid));

  </script>
</body>
</html>
