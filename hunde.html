  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f0ece0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
      padding: 18px 18px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .dog-name {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      font-weight: normal;
    }

    .scene {
      position: relative;
      width: 300px;
      height: 220px;
    }

    /* Sprechblase */
    .bubble {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 10px 14px;
      background: white;
      border: 2.5px solid #333;
      border-radius: 16px;
      min-width: 160px;
      max-width: 220px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      word-break: break-word;
    }

    .bubble::after {
      content: "";
      position: absolute;
      right: 28px;
      bottom: -15px;
      width: 16px;
      height: 16px;
      background: white;
      border-right: 2.5px solid #333;
      border-bottom: 2.5px solid #333;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }

    .bubble::before {
      content: "";
      position: absolute;
      right: 15px;
      bottom: -25px;
      width: 10px;
      height: 10px;
      background: white;
      border-right: 2.5px solid #333;
      border-bottom: 2.5px solid #333;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }

    .dog-wrap {
      position: absolute;
      right: 18px;
      bottom: 30px;
      animation: hop 1.1s infinite ease-in-out;
      transform-origin: center bottom;
    }

    @keyframes hop {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      25% {
        transform: translateY(-9px) rotate(-4deg);
      }

      50% {
        transform: translateY(0) rotate(4deg);
      }

      75% {
        transform: translateY(-4px) rotate(-2deg);
      }
    }
  </style>
</head>

        default:
          return `<rect width="${w}" height="${h}" fill="#e0e8f0"/>`;
      }
    }

    // ── Accessoire-SVG (relativ zum Hundekopf) ────────────────────
    // Koordinaten exakt wie in hundSVG: hx=s*0.26, hy=s*0.05, hr=s*0.22
    // Kopfmittelpunkt des Kreises liegt bei (hx, hy+hr)
    function accessoireSVG(typ, s) {
      // s = groesse
      const headX = s * 0.26;          // = hx
      const headY = s * 0.05 + s * 0.22; // = hy + hr  (Mitte des Kopfkreises)
      const headR = s * 0.22;          // = hr
      switch (typ) {
        case "hut":
          return `
            <rect x="${headX - headR * 0.9}" y="${headY - headR * 1.1}" width="${headR * 1.8}" height="${headR * 0.55}" rx="3" fill="#222" stroke="#111" stroke-width="1.5"/>
            <rect x="${headX - headR * 0.6}" y="${headY - headR * 1.1 - headR * 0.65}" width="${headR * 1.2}" height="${headR * 0.7}" rx="4" fill="#222" stroke="#111" stroke-width="1.5"/>
          `;
        case "sonnenbrille":
          return `
            <rect x="${headX - headR * 0.72}" y="${headY - headR * 0.30}" width="${headR * 0.55}" height="${headR * 0.38}" rx="5" fill="#1a1a2e" opacity="0.9" stroke="#555" stroke-width="1"/>
            <rect x="${headX + headR * 0.17}" y="${headY - headR * 0.30}" width="${headR * 0.55}" height="${headR * 0.38}" rx="5" fill="#1a1a2e" opacity="0.9" stroke="#555" stroke-width="1"/>
            <line x1="${headX - headR * 0.17}" y1="${headY - headR * 0.11}" x2="${headX + headR * 0.17}" y2="${headY - headR * 0.11}" stroke="#888" stroke-width="1.5"/>
            <line x1="${headX - headR * 0.72 - headR * 0.30}" y1="${headY - headR * 0.11}" x2="${headX - headR * 0.72}" y2="${headY - headR * 0.11}" stroke="#888" stroke-width="1.5"/>
            <line x1="${headX + headR * 0.72}" y1="${headY - headR * 0.11}" x2="${headX + headR * 0.72 + headR * 0.25}" y2="${headY - headR * 0.11}" stroke="#888" stroke-width="1.5"/>
          `;
        case "halstuch":
          return `
            <path d="M${headX - headR * 0.65} ${s * 0.47} Q${headX} ${s * 0.54} ${headX + headR * 0.65} ${s * 0.47} L${headX + headR * 0.5} ${s * 0.52} Q${headX} ${s * 0.60} ${headX - headR * 0.5} ${s * 0.52} Z"
              fill="#e03030" stroke="#a00" stroke-width="1"/>
            <polygon points="${headX},${s * 0.58} ${headX - headR * 0.22},${s * 0.68} ${headX + headR * 0.22},${s * 0.68}" fill="#c02020"/>
          `;
        case "krone":
          return `
            <polygon points="
              ${headX - headR * 0.85},${headY - headR * 0.85}
              ${headX - headR * 0.85},${headY - headR * 1.35}
              ${headX - headR * 0.42},${headY - headR * 1.00}
              ${headX},${headY - headR * 1.50}
              ${headX + headR * 0.42},${headY - headR * 1.00}
              ${headX + headR * 0.85},${headY - headR * 1.35}
              ${headX + headR * 0.85},${headY - headR * 0.85}
            " fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
            <circle cx="${headX - headR * 0.55}" cy="${headY - headR * 1.10}" r="${headR * 0.10}" fill="#e03030"/>
            <circle cx="${headX}"               cy="${headY - headR * 1.45}" r="${headR * 0.10}" fill="#3a8fe8"/>
            <circle cx="${headX + headR * 0.55}" cy="${headY - headR * 1.10}" r="${headR * 0.10}" fill="#e03030"/>
          `;
        case "krawatte":
          return `
            <polygon points="
              ${headX - headR * 0.12},${s * 0.44}
              ${headX + headR * 0.12},${s * 0.44}
              ${headX + headR * 0.08},${s * 0.56}
              ${headX},${s * 0.62}
              ${headX - headR * 0.08},${s * 0.56}
            " fill="#cc1111" stroke="#880000" stroke-width="1"/>
            <polygon points="
              ${headX - headR * 0.13},${s * 0.41}
              ${headX + headR * 0.13},${s * 0.41}
              ${headX + headR * 0.09},${s * 0.45}
              ${headX - headR * 0.09},${s * 0.45}
            " fill="#dd2222" stroke="#880000" stroke-width="1"/>
          `;
        case "fliege":
          return `
            <polygon points="
              ${headX - headR * 0.55},${s * 0.42}
              ${headX - headR * 0.10},${s * 0.45}
              ${headX - headR * 0.55},${s * 0.48}
            " fill="#1a1aaa" stroke="#000066" stroke-width="1"/>
            <polygon points="
              ${headX + headR * 0.55},${s * 0.42}
              ${headX + headR * 0.10},${s * 0.45}
              ${headX + headR * 0.55},${s * 0.48}
            " fill="#1a1aaa" stroke="#000066" stroke-width="1"/>
            <circle cx="${headX}" cy="${s * 0.45}" r="${headR * 0.13}" fill="#3333cc"/>
          `;
        case "halsband":
          return `
            <rect x="${headX - headR * 0.75}" y="${s * 0.43}" width="${headR * 1.5}" height="${headR * 0.25}" rx="${headR * 0.12}" fill="#c0392b" stroke="#7b241c" stroke-width="1.2"/>
            <rect x="${headX - headR * 0.10}" y="${s * 0.43}" width="${headR * 0.20}" height="${headR * 0.30}" rx="2" fill="#f0c040" stroke="#b8860b" stroke-width="1"/>
          `;
        case "brille":
          return `
            <circle cx="${headX - headR * 0.32}" cy="${headY - headR * 0.20}" r="${headR * 0.28}" fill="none" stroke="#5a3e1b" stroke-width="${s * 0.018}"/>
            <circle cx="${headX + headR * 0.38}" cy="${headY - headR * 0.20}" r="${headR * 0.28}" fill="none" stroke="#5a3e1b" stroke-width="${s * 0.018}"/>
            <line x1="${headX - headR * 0.04}" y1="${headY - headR * 0.20}" x2="${headX + headR * 0.10}" y2="${headY - headR * 0.20}" stroke="#5a3e1b" stroke-width="${s * 0.016}"/>
            <line x1="${headX - headR * 0.60}" y1="${headY - headR * 0.20}" x2="${headX - headR * 0.75}" y2="${headY - headR * 0.15}" stroke="#5a3e1b" stroke-width="${s * 0.016}"/>
            <line x1="${headX + headR * 0.66}" y1="${headY - headR * 0.20}" x2="${headX + headR * 0.80}" y2="${headY - headR * 0.15}" stroke="#5a3e1b" stroke-width="${s * 0.016}"/>
          `;
        case "schleife":
          return `
            <polygon points="
              ${headX - headR * 0.60},${headY - headR * 1.30}
              ${headX - headR * 0.05},${headY - headR * 1.05}
              ${headX - headR * 0.60},${headY - headR * 0.80}
            " fill="#e91e8c" stroke="#a0145a" stroke-width="1"/>
            <polygon points="
              ${headX + headR * 0.60},${headY - headR * 1.30}
              ${headX + headR * 0.05},${headY - headR * 1.05}
              ${headX + headR * 0.60},${headY - headR * 0.80}
            " fill="#e91e8c" stroke="#a0145a" stroke-width="1"/>
            <circle cx="${headX}" cy="${headY - headR * 1.05}" r="${headR * 0.16}" fill="#ff69b4"/>
          `;
        case "muetze":
          return `
            <ellipse cx="${headX}" cy="${headY - headR * 0.85}" rx="${headR * 1.05}" ry="${headR * 0.22}" fill="#cc3300" stroke="#882200" stroke-width="1.2"/>
            <path d="M${headX - headR * 0.95},${headY - headR * 0.85}
                     Q${headX - headR * 0.60},${headY - headR * 1.80}
                       ${headX + headR * 0.30},${headY - headR * 1.85}
                     Q${headX + headR * 0.90},${headY - headR * 1.80}
                       ${headX + headR * 0.95},${headY - headR * 0.85} Z"
              fill="#cc3300" stroke="#882200" stroke-width="1.2"/>
            <circle cx="${headX + headR * 0.55}" cy="${headY - headR * 1.90}" r="${headR * 0.22}" fill="white"/>
          `;
        case "kappe":
          return `
            <path d="M${headX - headR * 0.90},${headY - headR * 0.70}
                     Q${headX - headR * 0.50},${headY - headR * 1.55}
                       ${headX + headR * 0.70},${headY - headR * 1.40}
                     L${headX + headR * 0.90},${headY - headR * 0.70} Z"
              fill="#1565c0" stroke="#0d47a1" stroke-width="1.2"/>
            <rect x="${headX - headR * 1.10}" y="${headY - headR * 0.78}" width="${headR * 0.40}" height="${headR * 0.16}" rx="3" fill="#0d47a1"/>
            <ellipse cx="${headX}" cy="${headY - headR * 0.70}" rx="${headR * 1.05}" ry="${headR * 0.18}" fill="#1976d2" stroke="#0d47a1" stroke-width="1"/>
          `;
        case "kopfhoerer":
          return `
            <path d="M${headX - headR * 0.80},${headY + headR * 0.20}
                     A${headR * 0.85},${headR * 0.85} 0 0 1 ${headX + headR * 0.80},${headY + headR * 0.20}"
              fill="none" stroke="#333" stroke-width="${s * 0.035}" stroke-linecap="round"/>
            <rect x="${headX - headR * 1.00}" y="${headY + headR * 0.08}" width="${headR * 0.38}" height="${headR * 0.55}" rx="${headR * 0.14}" fill="#444" stroke="#222" stroke-width="1.2"/>
            <rect x="${headX + headR * 0.62}" y="${headY + headR * 0.08}" width="${headR * 0.38}" height="${headR * 0.55}" rx="${headR * 0.14}" fill="#444" stroke="#222" stroke-width="1.2"/>
          `;
        case "blume":
          return `
            <circle cx="${headX - headR * 0.20}" cy="${headY - headR * 1.15}" r="${headR * 0.32}" fill="#ff69b4" opacity="0.85"/>
            <circle cx="${headX + headR * 0.25}" cy="${headY - headR * 1.30}" r="${headR * 0.22}" fill="#ff69b4" opacity="0.75"/>
            <circle cx="${headX + headR * 0.50}" cy="${headY - headR * 1.05}" r="${headR * 0.20}" fill="#ff9fcc" opacity="0.80"/>
            <circle cx="${headX - headR * 0.20}" cy="${headY - headR * 1.15}" r="${headR * 0.14}" fill="#FFE066"/>
          `;
        default:
          return "";
      }
    }

    // ── SVG-Hund ──────────────────────────────────────────────────
    function hundSVG(config) {
      const s = config.groesse || 100;
      const p = fellpaletten[config.fellfarbe] || fellpaletten.braun;
      const acc = accessoireSVG(config.accessoire, s);

      // Proportionen relativ zu s
      const bx = s * 0.18, by = s * 0.45;   // Körper-Start
      const bw = s * 0.60, bh = s * 0.38;   // Körper-Breite/Höhe
      const hx = s * 0.26, hy = s * 0.05;   // Kopf-Mittelpunkt
      const hr = s * 0.22;                   // Kopf-Radius

      return `
      <svg width="${s}" height="${s * 1.30}" viewBox="0 ${-s * 0.30} ${s} ${s * 1.30}" xmlns="http://www.w3.org/2000/svg">

        <!-- Schwanz -->
        <path d="M${bx + bw} ${by + bh * 0.3}
                 Q${s * 1.05} ${by - bh * 0.2}
                   ${s * 0.95} ${by - bh * 0.45}"
          stroke="${p.body}" stroke-width="${s * 0.08}" fill="none" stroke-linecap="round"/>

        <!-- Körper -->
        <ellipse cx="${bx + bw * 0.50}" cy="${by + bh * 0.45}"
                 rx="${bw * 0.52}" ry="${bh * 0.46}" fill="${p.body}"/>
        <!-- Bauch -->
        <ellipse cx="${bx + bw * 0.45}" cy="${by + bh * 0.52}"
                 rx="${bw * 0.28}" ry="${bh * 0.30}" fill="${p.bauch}" opacity="0.7"/>

        <!-- Beine (4 Stück) -->
        <rect x="${bx + bw * 0.08}" y="${by + bh * 0.68}" width="${s * 0.09}" height="${s * 0.19}" rx="${s * 0.04}" fill="${p.body}"/>
        <rect x="${bx + bw * 0.25}" y="${by + bh * 0.72}" width="${s * 0.09}" height="${s * 0.17}" rx="${s * 0.04}" fill="${p.body}"/>
        <rect x="${bx + bw * 0.55}" y="${by + bh * 0.68}" width="${s * 0.09}" height="${s * 0.19}" rx="${s * 0.04}" fill="${p.body}"/>
        <rect x="${bx + bw * 0.72}" y="${by + bh * 0.72}" width="${s * 0.09}" height="${s * 0.17}" rx="${s * 0.04}" fill="${p.body}"/>

        <!-- Ohren -->
        <ellipse cx="${hx - hr * 0.55}" cy="${hy + hr * 0.10}" rx="${hr * 0.30}" ry="${hr * 0.55}"
                 fill="${p.ohr}" transform="rotate(-18, ${hx - hr * 0.55}, ${hy + hr * 0.10})"/>
        <ellipse cx="${hx + hr * 0.55}" cy="${hy + hr * 0.10}" rx="${hr * 0.30}" ry="${hr * 0.55}"
                 fill="${p.ohr}" transform="rotate(18, ${hx + hr * 0.55}, ${hy + hr * 0.10})"/>

        <!-- Kopf -->
        <circle cx="${hx}" cy="${hy + hr}" r="${hr}" fill="${p.body}"/>

        <!-- Schnauze -->
        <ellipse cx="${hx + hr * 0.18}" cy="${hy + hr * 1.42}" rx="${hr * 0.52}" ry="${hr * 0.35}" fill="${p.bauch}"/>
        <!-- Nase -->
        <ellipse cx="${hx + hr * 0.18}" cy="${hy + hr * 1.22}" rx="${hr * 0.22}" ry="${hr * 0.14}" fill="${p.nase}"/>
        <!-- Mund -->
        <path d="M${hx + hr * 0.0} ${hy + hr * 1.48} Q${hx + hr * 0.18} ${hy + hr * 1.62} ${hx + hr * 0.36} ${hy + hr * 1.48}"
          stroke="${p.nase}" stroke-width="${s * 0.025}" fill="none" stroke-linecap="round"/>

        <!-- Augen -->
        <circle cx="${hx - hr * 0.30}" cy="${hy + hr * 0.80}" r="${hr * 0.14}" fill="#222"/>
        <circle cx="${hx + hr * 0.55}" cy="${hy + hr * 0.80}" r="${hr * 0.14}" fill="#222"/>
        <circle cx="${hx - hr * 0.26}" cy="${hy + hr * 0.75}" r="${hr * 0.05}" fill="white"/>
        <circle cx="${hx + hr * 0.59}" cy="${hy + hr * 0.75}" r="${hr * 0.05}" fill="white"/>

        <!-- Accessoire -->
        ${acc}
      </svg>`;
    }

    // ── Karte für einen Hund rendern ──────────────────────────────
    function renderHund(config, container) {
      const W = 300, H = 220;

      // Karte
      const card = document.createElement("div");
      card.className = "card";

      // Person-Name in der Heading
      const h2 = document.createElement("h2");
      h2.textContent = config.person;
      card.appendChild(h2);

      // Scene
      const scene = document.createElement("div");
      scene.className = "scene";
      scene.style.width = W + "px";
      scene.style.height = H + "px";

      // Hintergrund-SVG
      const bgDiv = document.createElement("div");
      bgDiv.style.cssText = `position:absolute;top:0;left:0;width:${W}px;height:${H}px;border-radius:12px;overflow:hidden;`;
      bgDiv.innerHTML = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${hintergrundSVG(config.hintergrund, W, H)}</svg>`;
      scene.appendChild(bgDiv);

      // Sprechblase
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = config.texte[0] || "Wuff!";
      scene.appendChild(bubble);

      // Hund
      const dogWrap = document.createElement("div");
      dogWrap.className = "dog-wrap";
      dogWrap.innerHTML = hundSVG(config);
      scene.appendChild(dogWrap);

      card.appendChild(scene);

      // Hund-Name unter der Szene (auf der Karte sichtbar)
      const dogNameDiv = document.createElement("div");
      dogNameDiv.className = "dog-name";
      dogNameDiv.textContent = config.hundName;
      card.appendChild(dogNameDiv); // Append to card, not scene
      container.appendChild(card);

      // Text-Rotation (nur wenn mehr als ein Text vorhanden)
      if (config.texte.length > 1) {
        let idx = 0;
        setInterval(() => {
          idx = (idx + 1) % config.texte.length;
          bubble.textContent = config.texte[idx];
        }, 1000 + Math.random() * 500);
      }
    }

    // ── Alle Hunde rendern ────────────────────────────────────────
    const grid = document.getElementById("grid");
    alleHunde.forEach(cfg => renderHund(cfg, grid));

  </script>
