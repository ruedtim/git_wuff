<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hund mit Sprechblase</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ea;
      font-family: Arial, sans-serif;
    }
    .scene {
      position: relative;
      width: 360px;
      height: 240px;
    }
    .bubble {
      display: inline-block;
      position: absolute;
      top: 10px;
      left: 18px;
      padding: 14px 18px;
      background: white;
      border: 3px solid #222;
      border-radius: 18px;
      min-width: 220px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }
    .bubble::after {
      content: "";
      position: absolute;
      right: 34px;
      bottom: -18px;
      width: 20px;
      height: 20px;
      background: white;
      border-right: 3px solid #222;
      border-bottom: 3px solid #222;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }
    .bubble::before {
      content: "";
      position: absolute;
      right: 18px;
      bottom: -30px;
      width: 12px;
      height: 12px;
      background: white;
      border-right: 3px solid #222;
      border-bottom: 3px solid #222;
      transform: rotate(35deg);
      border-bottom-right-radius: 4px;
    }
    .dog {
      position: absolute;
      right: 34px;
      bottom: 16px;
      font-size: 110px;
      display: inline-block;
      animation: hop 1s infinite ease-in-out;
      transform-origin: center bottom;
    }
    @keyframes hop {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-4deg); }
      50% { transform: translateY(0) rotate(4deg); }
      75% { transform: translateY(-4px) rotate(-2deg); }
    }
    .hint {
      position: absolute;
      left: 18px;
      bottom: 10px;
      font-size: 14px;
      color: #444;
    }
    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bubble" id="bubble">Wuff!</div>
    <div class="dog">🐶</div>
    <div class="hint">Erweiterbar in <code>texte</code> im Skript.</div>
  </div>

  <script>
    const texte = [
      "Wuff!",
      "Ich mag Archive.",
      "Git ist praktisch.",
      "Commit nicht vergessen!"
      // Hier können weitere Texte ergänzt werden,
      // z. B. "Hallo Team!"
    ];

    let i = 0;
    const bubble = document.getElementById("bubble");

    setInterval(() => {
      i = (i + 1) % texte.length;
      bubble.textContent = texte[i];
    }, 1000);
  </script>
</body>
</html>
